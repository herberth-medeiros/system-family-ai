services:
  postgres:
    image: postgres:16-alpine
    container_name: system-family-postgres
    environment:
      POSTGRES_DB: system_family_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d system_family_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: system-family-ai
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/system_family_ai
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
